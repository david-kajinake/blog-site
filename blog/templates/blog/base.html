{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard | My Django Blog{% endblock %}</title>
    
    <link rel="stylesheet" href="{% static 'blog/css/base.css' %}?v={{css_latest}}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    <input type="checkbox" id="mobile-menu-toggle" class="menu-toggle-checkbox">

    <header class="auth-header">
        <div class="header-left">
            <label for="mobile-menu-toggle" class="hamburger-menu">
                <span></span><span></span><span></span>
            </label>
            <a href="/" class="brand-logo">BlogDash</a>
        </div>
        
        <nav class="header-nav">
            <a href="#">Home</a>
            <a href="#">Blogs</a>
            <a href="#">About</a>
            
            <form action="{% url 'user_logout' %}" method="POST" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="logout-link">Logout</button>
            </form>
        </nav>
    </header>

    <div class="app-container">
        
        <aside class="auth-sidebar">
            <nav class="sidebar-menu">
                <p class="menu-label">Menu</p>
                <a  href="#" class="sidebar-link active" data-tag="dashboard" >
                    <span class="icon">📊</span> Dashboard
                </a>
                <a href="#" class="sidebar-link" data-tag="my-blogs" >
                    <span class="icon">📝</span> My Blogs
                </a>
                
                <p class="menu-label">Personal</p>
                <a href="#" class="sidebar-link" data-tag="profile" >
                    <span class="icon">👤</span> Profile
                </a>
                <a href="#" class="sidebar-link" data-tag="settings" >
                    <span class="icon">⚙️</span> Settings
                </a>
            </nav>
        </aside>

        <main class="auth-main-content">
            {% block content %}
            {% endblock %}
        </main>
        
    </div>

    {% block extra_js %}
    <script type="module" src="{% static 'blog/js/base.js' %}?v={{js_latest}}"></script>
    {% endblock %}
</body>
</html>
