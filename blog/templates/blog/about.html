{% extends 'blog/layout.html' %}

{% block title %}About | My Django Blog{% endblock %}

{% block content %}
<div class="about-container" style="max-width: 800px; margin: 0 auto; background: #fff; padding: 3rem; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
    
    <h1 style="color: #2c3e50; margin-bottom: 1.5rem; font-size: 2.5rem;">About Us</h1>
    <p style="font-size: 1.1rem; color: #555; margin-bottom: 2rem;">
      {{about.about_text}}
    </p>

    <h2 style="color: #2c3e50; margin-bottom: 1rem; border-bottom: 2px solid #ecf0f1; padding-bottom: 0.5rem;">Our Mission</h2>
    <p style="font-size: 1.1rem; color: #555; margin-bottom: 2rem;">
        {{about.about_mission}}
    </p>

    <h2 style="color: #2c3e50; margin-bottom: 1rem; border-bottom: 2px solid #ecf0f1; padding-bottom: 0.5rem;">Our Vision</h2>
    <p style="font-size: 1.1rem; color: #555;">
        {{about.about_vision}}
    </p>

</div>
{% endblock %}
