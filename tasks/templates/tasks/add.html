{% extends 'tasks/base.html' %}

{% block title %}
Add Task
{% endblock %}

{% block content %}
  <h3>Add Task</h3>
  <form action = "{% url 'add_tasks' %}" method="post" >
    {% csrf_token %}
    {{ form }}
    <button type = "Submit">Submit task</button>
  </form>
  <br>
  <br>
  <p>
    {{ form_error_text }}
  </p>
  <br>
  <br>
  <a href="{% url 'view_tasks' %}"> View Tasks </a>


{% endblock %}
