{% extends "tasks/base.html" %}

{% block title %}
View tasks
{% endblock %}

{% block content %}
 <h4>Availabe tasks</h4>

<ol>
    {% for task in all_tasks %}
        {% for speaker_swapped in tasks %}
            <li>{{ task }} said you should {{ speaker_swapped }}</li>
        {% endfor %}
    {%endfor%}
</ol>

 <br>
 <br>
 <a href="{% url 'add_tasks' %}">Add task </a>
{% endblock %}
